# Ultralytics tracker config - BoT-SORT motion-only fallback
# Used for exported runtimes (TensorRT/OpenVINO) where native PyTorch
# feature hooks for ReID are unavailable.

tracker_type: botsort

track_high_thresh: 0.5
track_low_thresh: 0.1
new_track_thresh: 0.6
track_buffer: 30
match_thresh: 0.8

proximity_thresh: 0.5
appearance_thresh: 0.8
with_reid: false
model: auto

fuse_score: true
gmc_method: sparseOptFlow
