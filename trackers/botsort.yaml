# Ultralytics tracker config - BoT-SORT + ReID
# Goal: keep camera motion compensation active while using native detector
# features for appearance matching when the active model is a PyTorch .pt.

tracker_type: botsort

track_high_thresh: 0.5
track_low_thresh: 0.1
new_track_thresh: 0.6
track_buffer: 30
match_thresh: 0.8

# ReID matching gates.
proximity_thresh: 0.5
appearance_thresh: 0.8

# model: auto lets Ultralytics reuse native YOLO detector features, avoiding
# a separate ReID model file for the normal .pt runtime. Exported backends
# use trackers/botsort_motion.yaml from the inference engine because their
# native feature maps are not available through the same PyTorch hook.
with_reid: true
model: auto

fuse_score: true

# Camera Motion Compensation / Global Motion Compensation
# Common options in Ultralytics: sparseOptFlow, orb, ecc, none
gmc_method: sparseOptFlow
